<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Coconut Ascension: Tropical Clicker Odyssey</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1b4d2e 0%, #0e2a1a 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Tropical leaves decoration */
        .leaf-left, .leaf-right {
            position: fixed;
            bottom: 0;
            width: 180px;
            pointer-events: none;
            z-index: 5;
            opacity: 0.7;
        }
        .leaf-left { left: 0; }
        .leaf-right { right: 0; transform: scaleX(-1); }

        .game-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 248, 225, 0.96);
            backdrop-filter: blur(8px);
            border-radius: 64px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
            z-index: 20;
        }

        .game-scroll {
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px 18px 30px;
            scrollbar-width: thin;
        }

        .counter-card {
            background: #fff7e8;
            border-radius: 60px;
            padding: 16px 20px;
            text-align: center;
            box-shadow: 0 6px 0 #c29b4a;
            margin-bottom: 20px;
        }

        .coconut-number {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #b87333, #e7b42c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .ascension-badge {
            background: #ffd966;
            border-radius: 40px;
            padding: 6px 12px;
            font-weight: bold;
            color: #7a3e1f;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .click-area {
            background: #fbe9c3;
            border-radius: 80px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 0 #b6863c;
        }

        .coconut-btn {
            background: none;
            border: none;
            font-size: 5rem;
            cursor: pointer;
            transition: transform 0.1s ease;
            filter: drop-shadow(6px 8px 0 #9b6e3a);
            touch-action: manipulation;
        }
        .coconut-btn:active { transform: scale(0.92); }

        .stats-panel {
            background: #fef3e0;
            border-radius: 36px;
            padding: 12px 18px;
            flex: 1;
        }

        .merchant-panel {
            background: linear-gradient(135deg, #faeecd, #f5e2b5);
            border-radius: 48px;
            padding: 14px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .merchant-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .timer-badge {
            background: #7f5539;
            color: white;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.8rem;
            font-family: monospace;
        }

        .merchant-stock {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 12px 4px;
            -webkit-overflow-scrolling: touch;
        }

        .variant-card {
            min-width: 130px;
            background: #fff6e6;
            border-radius: 28px;
            padding: 12px 8px;
            text-align: center;
            border: 2px solid #e7bc7e;
            transition: 0.1s;
        }

        .buy-btn {
            background: #4c8b3c;
            border: none;
            border-radius: 32px;
            color: white;
            padding: 6px 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
        }

        .upgrade-scroll {
            display: flex;
            overflow-x: auto;
            gap: 14px;
            padding: 8px 0;
        }

        .upgrade-item {
            background: #fffaec;
            border-radius: 28px;
            min-width: 140px;
            padding: 12px;
            text-align: center;
        }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 16px 0;
        }

        .action-btn {
            background: #7f5539;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 10px 18px;
            cursor: pointer;
            font-weight: bold;
        }
        .action-btn:active { transform: scale(0.97); }

        .particle-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 200;
        }

        .falling-coconut {
            position: absolute;
            font-size: 2rem;
            pointer-events: none;
            z-index: 250;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
            animation: sway 0.5s ease-in-out;
        }

        @keyframes sway {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); }
            100% { transform: rotate(0deg); }
        }

        .ascension-glow {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255,215,0,0.5) 0%, rgba(255,100,0,0) 80%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 150;
        }

        .achievement-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #3d2b1a;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            z-index: 1000;
            transition: transform 0.3s ease;
            border: 2px solid #fff;
            white-space: nowrap;
        }
        .achievement-toast.show { transform: translateX(-50%) translateY(0); }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: #fff7e6;
            border-radius: 64px;
            max-width: 90%;
            width: 500px;
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .import-textarea {
            width: 100%;
            padding: 8px;
            border-radius: 20px;
            border: 2px solid #c9a87b;
            font-family: monospace;
        }
        .save-text { font-size: 0.7rem; text-align: center; margin-top: 16px; color: #8b6946; cursor: pointer; background: #f0e6d0; padding: 6px 12px; border-radius: 40px; display: inline-block; }
        .save-bar { display: flex; justify-content: center; gap: 8px; margin-top: 8px; }
        .merchant-fresh {
            animation: pulseGreen 0.5s ease;
        }
        @keyframes pulseGreen {
            0% { background: #faeecd; }
            50% { background: #c8e6b5; }
            100% { background: #faeecd; }
        }
        @media (max-width: 600px) {
            .coconut-btn { font-size: 3.8rem; }
            .variant-card { min-width: 115px; }
        }
    </style>
</head>
<body>

<div class="leaf-left">
    <svg width="180" height="300" viewBox="0 0 200 300" fill="none"><path d="M20,280 Q80,200 40,100 Q100,150 160,80 Q130,160 170,220 Q120,250 100,300 Z" fill="#2d6a4f" opacity="0.7"/></svg>
</div>
<div class="leaf-right">
    <svg width="180" height="300" viewBox="0 0 200 300" fill="none"><path d="M180,280 Q120,200 160,100 Q100,150 40,80 Q70,160 30,220 Q80,250 100,300 Z" fill="#2d6a4f" opacity="0.7"/></svg>
</div>

<div class="game-container">
    <div class="game-scroll">
        <div class="counter-card">
            <div class="coconut-number" id="coconutDisplay">0</div>
            <div class="ascension-badge">
                🌴 Ascension Tier: <span id="ascensionTier">0</span>
                <span id="ascensionBoostSpan">(+0%)</span>
            </div>
            <div class="progress-bar" style="height:12px; background:#ddc7a0; border-radius:20px; margin-top:12px;">
                <div id="ascensionProgressFill" style="width:0%; height:100%; background:#d4a017; border-radius:20px;"></div>
            </div>
            <div id="nextAscensionInfo" style="font-size:0.7rem;">Next ascension: 1,000,000 🥥</div>
        </div>

        <div class="click-area">
            <button class="coconut-btn" id="clickCoconutBtn">🥥</button>
            <div class="stats-panel">
                <div>⚡ Per click: <strong id="clickPower">1</strong></div>
                <div>🌊 Passive/sec: <strong id="passiveIncome">0</strong></div>
                <div>🥥 Total clicks: <span id="totalClicks">0</span></div>
            </div>
        </div>

        <!-- ROTATING MERCHANT with timer & many coconut types -->
        <div class="merchant-panel" id="merchantPanel">
            <div class="merchant-header">
                <span>🏪 Tropical Merchant (rotating stock)</span>
                <span class="timer-badge" id="refreshTimer">🔄 30s</span>
            </div>
            <div class="merchant-stock" id="merchantStock"></div>
            <div style="font-size:0.7rem; text-align:center; margin-top:8px;">✨ New exotic coconuts every 30 seconds!</div>
        </div>

        <div>
            <div>✨ Upgrades & blessings</div>
            <div class="upgrade-scroll" id="upgradeList"></div>
        </div>

        <div class="action-bar">
            <button class="action-btn" id="ascendBtn">🌺 ASCEND 🌺</button>
            <button class="action-btn" id="resetStatsBtn">🗑️ Soft Reset</button>
            <button class="action-btn" id="showAchievementsBtn">🏆 Achievements</button>
            <button class="action-btn" id="importExportBtn">💾 Save/Load</button>
        </div>
        <div class="save-bar">
            <div class="save-text" id="saveIndicator">💾 Auto-saved</div>
        </div>
    </div>
</div>

<div class="particle-layer" id="particleLayer"></div>
<div class="ascension-glow" id="ascensionGlow"></div>
<div id="achievementToast" class="achievement-toast">🎉 <span id="toastMsg"></span></div>

<script>
    // ------------------- 12+ UNIQUE COCONUT VARIANTS (different kinds) -------------------
    const COCONUT_VAULT = [
        { id: "golden", name: "✨ Golden Coconut", basePrice: 500, gain: 200, emoji: "🌟", desc: "Lucky golden shine" },
        { id: "jumbo", name: "🐘 Jumbo Coconut", basePrice: 1800, gain: 850, emoji: "🥥💥", desc: "Massive tropical fruit" },
        { id: "magical", name: "🔮 Magical Coconut", basePrice: 6000, gain: 3200, emoji: "✨", desc: "Enchanted essence" },
        { id: "dragon", name: "🐉 Dragon Coconut", basePrice: 15000, gain: 7800, emoji: "🐉🔥", desc: "Volcanic spirit" },
        { id: "frost", name: "❄️ Frost Coconut", basePrice: 22000, gain: 12000, emoji: "🧊", desc: "Chilled from north" },
        { id: "rainbow", name: "🌈 Rainbow Coconut", basePrice: 35000, gain: 20000, emoji: "🌈", desc: "Taste the spectrum" },
        { id: "void", name: "🌑 Void Coconut", basePrice: 55000, gain: 33000, emoji: "🌌", desc: "Abyssal harvest" },
        { id: "mecha", name: "🤖 Mecha Coconut", basePrice: 80000, gain: 50000, emoji: "⚙️", desc: "Cyber-coconut" },
        { id: "phoenix", name: "🔥 Phoenix Coconut", basePrice: 120000, gain: 75000, emoji: "🕊️🔥", desc: "Rebirth flames" },
        { id: "cosmic", name: "🌠 Cosmic Coconut", basePrice: 180000, gain: 110000, emoji: "🌠", desc: "Stardust infused" },
        { id: "ancient", name: "🏺 Ancient Coconut", basePrice: 250000, gain: 160000, emoji: "🏺", desc: "Lost civilization" },
        { id: "godly", name: "👑 Godly Coconut", basePrice: 500000, gain: 350000, emoji: "👑✨", desc: "Ascended fruit" }
    ];

    // Game state
    let state = {
        coconuts: 0,
        totalCoconutsEarned: 0,
        clickPower: 1,
        passivePerSecond: 0,
        ascensionTier: 0,
        totalClicks: 0,
        upgrades: { strongerFingers: 0, monkeyHelpers: 0, coconutFertilizer: 0 },
        specialsBought: {}, // dynamic
        ascensionBonus: 0,
        lastTimestamp: Date.now()
    };

    // Initialize bought counters for all coconut types
    function initBoughtCounters() {
        COCONUT_VAULT.forEach(c => { if(state.specialsBought[c.id] === undefined) state.specialsBought[c.id] = 0; });
    }

    const upgradesList = [
        { id: 'strongerFingers', name: '💪 Stronger Fingers', baseCost: 50, effect: () => { state.clickPower += 1; }, desc: '+1 click power', getCost: (lvl) => 50 + (lvl * 40) },
        { id: 'monkeyHelpers', name: '🐒 Monkey Helpers', baseCost: 120, effect: () => { state.passivePerSecond += 0.5; }, desc: '+0.5 🥥/sec', getCost: (lvl) => 120 + (lvl * 70) },
        { id: 'coconutFertilizer', name: '🌿 Fertilizer', baseCost: 400, effect: () => { state.passivePerSecond += 0.3; }, desc: '+0.3 🥥/sec', getCost: (lvl) => 400 + (lvl * 150) }
    ];

    let achievements = [
        { id: 'click100', name: 'Novice Clicker', desc: '100 clicks', req: () => state.totalClicks >= 100, reward: 50, icon: '🖱️', unlocked: false },
        { id: 'click1k', name: 'Coconut Mania', desc: '1000 clicks', req: () => state.totalClicks >= 1000, reward: 300, icon: '🖱️🖱️', unlocked: false },
        { id: 'coconutMillion', name: 'Millionaire Farmer', desc: '1M total earned', req: () => state.totalCoconutsEarned >= 1000000, reward: 1000, icon: '💸', unlocked: false },
        { id: 'ascend1', name: 'First Ascension', desc: 'Ascend once', req: () => state.ascensionTier >= 1, reward: 5000, icon: '🌴', unlocked: false },
        { id: 'ascend5', name: 'Enlightened Grove', desc: 'Ascend 5 times', req: () => state.ascensionTier >= 5, reward: 25000, icon: '🌺', unlocked: false },
        { id: 'merchantSpree', name: 'Loyal Customer', desc: 'Buy 30 specials', req: () => Object.values(state.specialsBought).reduce((a,b)=>a+b,0) >= 30, reward: 1500, icon: '🏪', unlocked: false },
        { id: 'maxPower', name: 'Finger of God', desc: 'Click power 25+', req: () => state.clickPower >= 25, reward: 10000, icon: '⚡', unlocked: false },
        { id: 'dragonFeast', name: 'Dragon Tamer', desc: 'Buy Dragon Coconut', req: () => (state.specialsBought['dragon']||0) >= 1, reward: 8000, icon: '🐉', unlocked: false },
        { id: 'cosmicExplorer', name: 'Star Seeker', desc: 'Buy Cosmic Coconut', req: () => (state.specialsBought['cosmic']||0) >= 1, reward: 25000, icon: '🌠', unlocked: false }
    ];

    // ----- ROTATING MERCHANT LOGIC (changes every 30 seconds, random 3 distinct coconuts) -----
    let currentMerchantItems = [];
    let merchantInterval = null;
    let countdownSeconds = 30;

    function pickRandomCoconuts(count = 3) {
        // shuffle copy and pick unique
        let shuffled = [...COCONUT_VAULT];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, count);
    }

    function refreshMerchant() {
        currentMerchantItems = pickRandomCoconuts(3);
        renderMerchant();
        // Flash animation
        const panel = document.getElementById('merchantPanel');
        panel.classList.add('merchant-fresh');
        setTimeout(() => panel.classList.remove('merchant-fresh'), 500);
        // reset countdown visual
        countdownSeconds = 30;
        updateTimerDisplay();
    }

    function updateTimerDisplay() {
        const timerSpan = document.getElementById('refreshTimer');
        if(timerSpan) timerSpan.innerText = `🔄 ${countdownSeconds}s`;
    }

    function startMerchantRotation() {
        if(merchantInterval) clearInterval(merchantInterval);
        refreshMerchant(); // initial stock
        merchantInterval = setInterval(() => {
            countdownSeconds--;
            updateTimerDisplay();
            if(countdownSeconds <= 0) {
                refreshMerchant();
                countdownSeconds = 30;
                updateTimerDisplay();
            }
        }, 1000);
    }

    function buySpecial(specialId, itemPrice, gainAmount) {
        if(state.coconuts >= itemPrice) {
            state.coconuts -= itemPrice;
            addCoconuts(gainAmount);
            state.specialsBought[specialId] = (state.specialsBought[specialId] || 0) + 1;
            updateUI();
            checkAchievements();
            showToast(`Bought ${COCONUT_VAULT.find(c=>c.id===specialId)?.name || specialId} +${gainAmount} 🥥`, '🛒');
            saveGame();
        } else {
            showToast(`Not enough 🥥! Need ${itemPrice.toLocaleString()}`, '⚠️');
        }
    }

    function renderMerchant() {
        const container = document.getElementById('merchantStock');
        if(!container) return;
        container.innerHTML = '';
        if(currentMerchantItems.length === 0) return;
        for(let item of currentMerchantItems) {
            let price = item.basePrice;
            // apply ascension discount? no, keep base but could show fun
            let div = document.createElement('div');
            div.className = 'variant-card';
            div.innerHTML = `
                <div style="font-size:2.5rem;">${item.emoji}</div>
                <div><strong>${item.name}</strong></div>
                <div style="font-size:0.7rem;">${item.desc}</div>
                <div>💰 ${price.toLocaleString()}</div>
                <div style="font-size:0.7rem;">✨ +${item.gain} 🥥</div>
                <button class="buy-btn" data-id="${item.id}" data-price="${price}" data-gain="${item.gain}">Buy Coconut</button>
            `;
            const btn = div.querySelector('button');
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                buySpecial(item.id, parseInt(btn.dataset.price), parseInt(btn.dataset.gain));
            });
            container.appendChild(div);
        }
    }

    // ----- Core mechanics -----
    function addCoconuts(amount, isClick=false) {
        let gain = amount;
        if(isClick) {
            gain = amount;
            state.totalClicks++;
        }
        state.coconuts += gain;
        state.totalCoconutsEarned += gain;
        if(state.coconuts < 0) state.coconuts = 0;
        checkAchievements();
        updateUI();
        if(isClick && gain>0) createFallingCoconut();
    }

    function spendCoconuts(amount) { if(state.coconuts >= amount) { state.coconuts -= amount; updateUI(); return true; } return false; }

    function buyUpgrade(upgradeId) {
        const up = upgradesList.find(u => u.id === upgradeId);
        let lvl = state.upgrades[upgradeId] || 0;
        let cost = up.getCost(lvl);
        if(state.coconuts >= cost) {
            spendCoconuts(cost);
            state.upgrades[upgradeId] = lvl + 1;
            up.effect();
            updateUI();
            checkAchievements();
            showToast(`Upgraded ${up.name}`, '🔨');
            saveGame();
        }
    }

    function performAscension() {
        let required = getAscensionCost();
        if(state.totalCoconutsEarned >= required && state.ascensionTier < 30) {
            const glow = document.getElementById('ascensionGlow');
            glow.style.opacity = '0.6';
            setTimeout(()=> glow.style.opacity = '0', 800);
            let newTier = state.ascensionTier + 1;
            let bonusPercent = newTier * 12;
            let preserved = {
                ascensionTier: newTier,
                ascensionBonus: bonusPercent,
                totalCoconutsEarned: state.totalCoconutsEarned,
                totalClicks: state.totalClicks,
                specialsBought: state.specialsBought,
                upgrades: { strongerFingers:0, monkeyHelpers:0, coconutFertilizer:0 }
            };
            state.coconuts = 0;
            state.clickPower = 1 + Math.floor(bonusPercent/25);
            state.passivePerSecond = 0;
            state.upgrades = preserved.upgrades;
            state.ascensionTier = preserved.ascensionTier;
            state.ascensionBonus = preserved.ascensionBonus;
            state.totalCoconutsEarned = preserved.totalCoconutsEarned;
            state.totalClicks = preserved.totalClicks;
            state.specialsBought = preserved.specialsBought;
            initBoughtCounters();
            recalcPassiveFromUpgrades();
            updateUI();
            showToast(`Ascended to Tier ${state.ascensionTier}! +${state.ascensionBonus}% bonus`, '🌴');
            saveGame();
        } else {
            showToast(`Need ${required.toLocaleString()} total coconuts to ascend`, '⚠️');
        }
    }

    function getAscensionCost() { return 1000000 * (state.ascensionTier + 1); }
    function getAscensionProgress() { let required = getAscensionCost(); return Math.min(1, state.totalCoconutsEarned / required) * 100; }
    function recalcPassiveFromUpgrades() { state.passivePerSecond = (state.upgrades.monkeyHelpers * 0.5) + (state.upgrades.coconutFertilizer * 0.3); }

    function updateUI() {
        document.getElementById('coconutDisplay').innerText = Math.floor(state.coconuts).toLocaleString();
        document.getElementById('clickPower').innerText = state.clickPower;
        document.getElementById('passiveIncome').innerText = state.passivePerSecond.toFixed(1);
        document.getElementById('ascensionTier').innerText = state.ascensionTier;
        let boostPercent = state.ascensionBonus || (state.ascensionTier*12);
        document.getElementById('ascensionBoostSpan').innerHTML = `(+${boostPercent}% bonus)`;
        document.getElementById('totalClicks').innerText = state.totalClicks;
        document.getElementById('ascensionProgressFill').style.width = getAscensionProgress() + '%';
        document.getElementById('nextAscensionInfo').innerHTML = `Next ascension: ${getAscensionCost().toLocaleString()} 🥥 total`;
        renderUpgrades();
        renderMerchant(); 
    }

    function renderUpgrades() {
        const container = document.getElementById('upgradeList');
        container.innerHTML = '';
        upgradesList.forEach(up => {
            let lvl = state.upgrades[up.id] || 0;
            let cost = up.getCost(lvl);
            let div = document.createElement('div');
            div.className = 'upgrade-item';
            div.innerHTML = `<div><strong>${up.name}</strong></div><div style="font-size:0.7rem;">${up.desc}</div><div>Level ${lvl}</div><div>💰 ${cost.toLocaleString()}</div><button class="buy-btn" data-id="${up.id}">Upgrade</button>`;
            div.querySelector('button').addEventListener('click', () => buyUpgrade(up.id));
            container.appendChild(div);
        });
    }

    function createFallingCoconut() {
        const layer = document.getElementById('particleLayer');
        const coconut = document.createElement('div');
        coconut.className = 'falling-coconut';
        coconut.innerText = '🥥';
        coconut.style.left = Math.random() * window.innerWidth + 'px';
        coconut.style.top = '-50px';
        coconut.style.position = 'fixed';
        coconut.style.fontSize = (1.5 + Math.random() * 1.5) + 'rem';
        layer.appendChild(coconut);
        let fall = 0;
        const interval = setInterval(() => {
            fall += 8;
            coconut.style.top = fall + 'px';
            if(fall > window.innerHeight + 100) { clearInterval(interval); coconut.remove(); }
        }, 30);
        setTimeout(() => { clearInterval(interval); if(coconut) coconut.remove(); }, 3000);
    }

    let toastTimeout = null;
    function showToast(message, icon='🎉') {
        const toast = document.getElementById('achievementToast');
        if(!toast) return;
        document.getElementById('toastMsg').innerHTML = `${icon} ${message}`;
        toast.classList.add('show');
        if(toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toast.classList.remove('show'), 2300);
    }

    function checkAchievements() {
        let newUnlock = false;
        achievements.forEach(ach => {
            if(!ach.unlocked && ach.req()) {
                ach.unlocked = true;
                newUnlock = true;
                addCoconuts(ach.reward);
                showToast(`${ach.name} +${ach.reward}🥥`, ach.icon);
            }
        });
        if(newUnlock) saveGame();
    }

    function softReset() {
        if(confirm('Soft reset: lose coconuts, upgrades, special purchases? (Ascension tier & achievements remain)')) {
            state.coconuts = 0;
            state.clickPower = 1 + Math.floor((state.ascensionBonus||0)/25);
            state.upgrades = { strongerFingers:0, monkeyHelpers:0, coconutFertilizer:0 };
            state.passivePerSecond = 0;
            state.specialsBought = {};
            initBoughtCounters();
            recalcPassiveFromUpgrades();
            updateUI();
            saveGame();
            showToast('Game soft reset!', '🔄');
        }
    }

    function importExportModal() {
        let modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.innerHTML = `<div class="modal-card"><h2>💾 Save / Load</h2><div class="import-area"><textarea id="exportData" class="import-textarea" rows="4" readonly>${JSON.stringify(state, null, 2)}</textarea><button id="copyBtn" class="action-btn" style="margin-top:8px;">📋 Copy Save</button></div><div class="import-area"><textarea id="importData" class="import-textarea" rows="4" placeholder="Paste save data..."></textarea><button id="importBtn" class="action-btn" style="background:#4c8b3c;">⬇️ Import</button></div><button class="close-btn" id="closeModalBtn">Close</button></div>`;
        document.body.appendChild(modalDiv);
        document.getElementById('copyBtn').onclick = () => { document.getElementById('exportData').select(); document.execCommand('copy'); showToast('Copied to clipboard!', '📋'); };
        document.getElementById('importBtn').onclick = () => { let txt = document.getElementById('importData').value; try { let parsed = JSON.parse(txt); if(parsed.coconuts !== undefined) { Object.assign(state, parsed); initBoughtCounters(); recalcPassiveFromUpgrades(); updateUI(); saveGame(); showToast('Game imported!', '✅'); modalDiv.remove(); } else throw new Error(); } catch(e) { showToast('Invalid save file!', '❌'); } };
        document.getElementById('closeModalBtn').onclick = () => modalDiv.remove();
        modalDiv.onclick = (e) => { if(e.target === modalDiv) modalDiv.remove(); };
    }

    function saveGame() { localStorage.setItem('coconutAscensionV2', JSON.stringify(state)); localStorage.setItem('achievementsV2', JSON.stringify(achievements.map(a=>a.unlocked))); document.getElementById('saveIndicator').innerHTML = '💾 Saved!'; setTimeout(()=> { if(document.getElementById('saveIndicator')) document.getElementById('saveIndicator').innerHTML = '💾 Auto-saved'; }, 1500); }
    function loadGame() {
        let saved = localStorage.getItem('coconutAscensionV2');
        if(saved) { try { let loaded = JSON.parse(saved); state = { ...state, ...loaded }; } catch(e) {} }
        let achSaved = localStorage.getItem('achievementsV2');
        if(achSaved) { try { let unlocks = JSON.parse(achSaved); achievements.forEach((ach,idx) => { if(unlocks[idx]) ach.unlocked = true; }); } catch(e) {} }
        initBoughtCounters();
        recalcPassiveFromUpgrades();
        updateUI();
    }

    let passiveInterval = null;
    function startPassive() { if(passiveInterval) clearInterval(passiveInterval); passiveInterval = setInterval(() => { if(state.passivePerSecond > 0) { addCoconuts(state.passivePerSecond); updateUI(); } }, 1000); }

    function init() {
        loadGame();
        startPassive();
        startMerchantRotation();
        document.getElementById('clickCoconutBtn').addEventListener('click', () => { let gain = state.clickPower; let bonus = state.ascensionBonus || (state.ascensionTier*12); let total = Math.floor(gain * (1 + bonus/100)); addCoconuts(total, true); updateUI(); });
        document.getElementById('ascendBtn').onclick = performAscension;
        document.getElementById('resetStatsBtn').onclick = softReset;
        document.getElementById('showAchievementsBtn').onclick = () => { let achStr = achievements.map(a=>`${a.unlocked?'✅':'🔒'} ${a.name}: ${a.desc} (+${a.reward})`).join('\n'); alert('🏆 Achievements:\n' + achStr); };
        document.getElementById('importExportBtn').onclick = importExportModal;
        setInterval(() => saveGame(), 30000);
    }
    init();
</script>
</body>
</html>
